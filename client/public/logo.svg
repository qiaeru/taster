<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Taster">
  <defs>
    <linearGradient id="taster-g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#ec4899"/>
    </linearGradient>
    <mask id="taster-bite">
      <rect width="64" height="64" fill="#fff"/>
      <!-- The bite taken out of the star: tasting means biting in. -->
      <circle cx="53" cy="13" r="11" fill="#000"/>
    </mask>
  </defs>
  <path
    d="M32 4 L38.8 22.7 L58.6 23.3 L42.9 35.6 L48.5 54.7 L32 43.5 L15.5 54.7 L21.1 35.6 L5.4 23.3 L25.2 22.7 Z"
    fill="url(#taster-g)" mask="url(#taster-bite)"
    stroke="url(#taster-g)" stroke-width="4" stroke-linejoin="round"/>
  <!-- Crumbs flying off the bite. -->
  <circle cx="50" cy="6" r="2.2" fill="url(#taster-g)"/>
  <circle cx="59" cy="16" r="1.6" fill="url(#taster-g)"/>
</svg>
