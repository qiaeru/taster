server {
    listen 80;
    server_name tastes.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name tastes.example.com;

    ssl_certificate     /etc/letsencrypt/live/tastes.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tastes.example.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # Image uploads go through the app (5 MB limit server-side); keep nginx's
    # own body cap above it so the app's error message wins.
    client_max_body_size 20m;

    location / {
        proxy_pass http://taster:3000;
        proxy_http_version 1.1;
        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;
    }
}
