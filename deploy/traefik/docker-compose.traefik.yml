# HTTPS deployment with Traefik v3 (Let's Encrypt via HTTP challenge).
# Run from the project root:
#   export TASTER_DOMAIN=tastes.example.com
#   export LETSENCRYPT_EMAIL=you@example.com
#   export SESSION_SECRET="$(openssl rand -base64 48)"
#   docker compose -f deploy/traefik/docker-compose.traefik.yml up -d

services:
  traefik:
    image: traefik:v3.6
    restart: unless-stopped
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.le.acme.httpchallenge=true"
      - "--certificatesresolvers.le.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.le.acme.email=${LETSENCRYPT_EMAIL:?Set LETSENCRYPT_EMAIL}"
      - "--certificatesresolvers.le.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt:/letsencrypt

  taster:
    build: ../..
    image: taster:latest
    restart: unless-stopped
    volumes:
      - ../../var:/app/var
    environment:
      NODE_ENV: production
      PORT: 3000
      SESSION_SECRET: ${SESSION_SECRET:?Set SESSION_SECRET}
      PUBLIC_URL: https://${TASTER_DOMAIN:?Set TASTER_DOMAIN}
      COOKIE_SECURE: "1"
      TRUST_PROXY: "1"
      SEED_LOCALE: ${SEED_LOCALE:-fr}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.taster.rule=Host(`${TASTER_DOMAIN}`)"
      - "traefik.http.routers.taster.entrypoints=websecure"
      - "traefik.http.routers.taster.tls.certresolver=le"
      - "traefik.http.services.taster.loadbalancer.server.port=3000"

volumes:
  letsencrypt:
